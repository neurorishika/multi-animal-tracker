site_name: HYDRA Suite Docs
site_description: User and developer documentation for HYDRA Suite
site_url: https://neurorishika.github.io/hydra-suite/
repo_url: https://github.com/neurorishika/hydra-suite
repo_name: neurorishika/hydra-suite
edit_uri: edit/main/docs/
strict: true

extra:
  version:
    provider: mike
    default: latest
exclude_docs: |
  archive/**
hooks:
- docs/hooks.py

theme:
  name: material
  language: en
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.top
  - content.code.copy
  - content.action.edit
  - search.suggest
  - search.highlight
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: blue
    accent: light blue
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: blue
    accent: light blue
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode

plugins:
- search
- autorefs
- include-markdown
- mkdocstrings:
    handlers:
      python:
        paths:
        - src
        options:
          docstring_style:
          show_source: false
          show_root_heading: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          members_order: source

markdown_extensions:
- admonition
- attr_list
- def_list
- footnotes
- md_in_html
- tables
- toc:
    permalink: true
- pymdownx.details
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.tasklist:
    custom_checkbox: true
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg

