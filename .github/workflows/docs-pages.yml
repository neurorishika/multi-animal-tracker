name: Docs (GitHub Pages)

on:
  push:
    branches:
    - '**'
  workflow_dispatch:
    inputs:
      deploy_as:
        description: 'Version label to deploy (latest or nightly)'
        required: false
        default: 'nightly'

# mike pushes directly to the gh-pages branch, so contents: write is required.
permissions:
  contents: write

# Use per-ref concurrency so main and nightly deployments don't block each other,
# but rapid successive pushes to the same branch cancel the older run.
concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # mike needs the full history to manage the gh-pages branch
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install docs dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-docs.txt

    - name: Configure Git identity for mike
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Deploy stable docs (main branch → "latest")
      if: github.ref_name == 'main'
      run: |
        mike deploy --push --update-aliases latest "Latest"
        mike set-default --push latest

    - name: Deploy nightly docs (non-main branch → "nightly")
      if: github.ref_name != 'main'
      run: |
        mike deploy --push nightly "Nightly"
